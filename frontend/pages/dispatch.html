<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispatch Reports — ConnectifyU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/forms.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
</head>
<body class="cc-page--dashboard">

  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="dash-brand"><span class="cc-brand-dot"></span> ConnectifyU</div>
      <nav class="dash-nav">
        <a href="./organiser-dashboard.html">← Back to Dashboard</a>
      </nav>
    </aside>

    <main class="dash-main">
      <div class="dash-topbar" style="margin-bottom: 24px;">
        <div>
          <h1>Dispatch Attendance Reports</h1>
          <div class="dash-topbar-sub">Select faculty mentors to send the final attendance Excel sheets to.</div>
        </div>
        <div class="dash-actions">
          <span style="font-size: 14px; font-weight: 600; color: var(--c-text-muted); align-self: center; margin-right: 12px;" id="selectionCount">0 selected</span>
          <button id="sendBtn" class="cc-btn cc-btn-primary" disabled>📨 Send report</button>
        </div>
      </div>

      <div class="cc-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 class="cc-card-title" style="margin: 0;">Faculty Mentors</h2>
          <button id="selectAll" class="cc-btn cc-btn-ghost cc-btn-sm" aria-pressed="false">Select all</button>
        </div>

        <div id="mentorLoading" style="padding: 24px; text-align: center; color: var(--c-text-muted);">Loading mentors...</div>
        
        <div class="cc-empty" id="mentorEmpty" hidden>
          <div class="cc-empty-icon">👩‍🏫</div>
          <div class="cc-empty-title">No mentors found</div>
          <p class="cc-empty-text">There are no faculty mentors assigned for this event's attendees.</p>
        </div>

        <div class="dispatch-mentor-grid" id="mentorList" hidden></div>
      </div>
    </main>
  </div>

  <div id="toast" class="cc-toast" role="status" aria-live="polite"></div>
  <script src="../scripts/organiser.js"></script>
</body>
</html>
