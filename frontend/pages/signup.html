<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — ConnectifyU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/forms.css" />
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px;">

  <main style="width: 100%; max-width: 600px;">
    <div style="text-align: center; margin-bottom: 32px;">
      <a class="cc-brand" href="../index.html" style="justify-content: center; font-size: 24px;">
        <span class="cc-brand-dot"></span> ConnectifyU
      </a>
    </div>

    <div class="cc-card">
      <h1 class="cc-card-title">Create your account</h1>
      <p class="cc-card-sub">Join ConnectifyU to register for events and track attendance.</p>

      <form action="./login.html" method="GET">
        
        <div class="cc-form-grid">
          <div class="cc-field full">
            <label class="cc-label" for="fullName">Full Name <span class="req">*</span></label>
            <input class="cc-input" type="text" id="fullName" placeholder="e.g. Rahul Sharma" required />
          </div>

          <div class="cc-field">
            <label class="cc-label" for="email">College Email <span class="req">*</span></label>
            <input class="cc-input" type="email" id="email" placeholder="you@college.edu" required />
          </div>

          <div class="cc-field">
            <label class="cc-label" for="rollNo">Roll Number <span class="req">*</span></label>
            <input class="cc-input" type="text" id="rollNo" placeholder="e.g. CSE21045" required />
          </div>

          <div class="cc-field">
            <label class="cc-label" for="dept">Department <span class="req">*</span></label>
            <select class="cc-select" id="dept" required>
              <option value="">Select Department</option>
              <option value="CSE">Computer Science</option>
              <option value="IT">Information Technology</option>
              <option value="ECE">Electronics</option>
              <option value="MECH">Mechanical</option>
            </select>
          </div>

          <div class="cc-field">
            <label class="cc-label" for="year">Year of Study <span class="req">*</span></label>
            <select class="cc-select" id="year" required>
              <option value="">Select Year</option>
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
            </select>
          </div>

          <div class="cc-field full">
            <label class="cc-label" for="password">Create Password <span class="req">*</span></label>
            <input class="cc-input" type="password" id="password" placeholder="At least 8 characters" required />
          </div>
        </div>
<div class="cc-field full" style="margin-top: 16px; padding: 16px; background: var(--c-bg); border-radius: 8px; border: 1px solid var(--c-border);">
            <label class="cc-label" style="margin-bottom: 12px;">Request Special Access (Optional)</label>
            
            <div style="display: flex; gap: 16px; flex-wrap: wrap;">
              <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer;">
                <input type="radio" name="roleRequest" value="student" checked />
                None (Standard Student)
              </label>
              
              <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer;">
                <input type="radio" name="roleRequest" value="organiser" />
                Event Organiser
              </label>
              
              <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer;">
                <input type="radio" name="roleRequest" value="faculty" />
                Faculty Mentor
              </label>
            </div>
            <div style="font-size: 12px; color: var(--c-text-muted); margin-top: 12px;">
              * Note: Organiser and Faculty accounts require administrator approval. You will have basic student access until approved.
            </div>
          </div>
        <div class="cc-form-actions" style="margin-top: 32px;">
          <button type="submit" class="cc-btn cc-btn-primary" style="width: 100%;">Create Account</button>
        </div>
      </form>

      <div style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--c-text-muted);">
        Already have an account? <a href="./login.html" style="color: var(--c-primary); font-weight: 600;">Log in</a>
      </div>
    </div>
  </main>

</body>
</html>
