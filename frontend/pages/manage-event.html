<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Event — ConnectifyU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/forms.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
</head>
<body class="cc-page--dashboard">

  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="dash-brand"><span class="cc-brand-dot"></span> ConnectifyU</div>
      <nav class="dash-nav">
        <a href="./organiser-dashboard.html">← Back to Dashboard</a>
      </nav>
    </aside>

    <main class="dash-main">
      <div class="dash-topbar" style="margin-bottom: 20px;">
        <div>
          <h1 id="evTitle">Loading Event...</h1>
          <div class="dash-topbar-sub" id="evMeta">Loading details...</div>
        </div>
        <span class="cc-status" id="evStatus">...</span>
      </div>

      <div class="dash-stats">
        <div class="dash-stat stat-live">
          <div class="dash-stat-label">Live Check-ins</div>
          <div class="dash-stat-value" id="liveCount">-</div>
        </div>
        <div class="dash-stat stat-regs">
          <div class="dash-stat-label">Total Registered</div>
          <div class="dash-stat-value" id="regCount">-</div>
        </div>
        <div class="dash-stat" style="border-left: 4px solid var(--c-border);">
          <div class="dash-stat-label">Venue Capacity</div>
          <div class="dash-stat-value" id="capCount">-</div>
        </div>
      </div>

      <div class="cc-card">
        <h2 class="cc-card-title">Attendance Progress</h2>
        <div class="manage-progress-wrap">
          <div class="manage-progress-label">
            <span id="progFraction">- / - checked in</span>
            <span id="progLabel">0%</span>
          </div>
          <div class="cc-progress">
            <div class="cc-progress-fill" id="progFill" style="width: 0%;" id="progBar"></div>
          </div>
        </div>
        
        <div class="manage-actions">
          <button id="excelBtn" class="cc-btn cc-btn-ghost cc-btn-sm">⬇ Export Excel</button>
          <a href="#" id="dispatchLink" class="cc-btn cc-btn-ghost cc-btn-sm">📨 Dispatch to Mentors</a>
          <button id="certBtn" class="cc-btn cc-btn-primary cc-btn-sm" style="margin-left: auto;">🎓 Issue Certificates</button>
        </div>
      </div>

      <div class="dash-table-card" style="margin-top: 24px;">
        <div class="dash-table-head">
          <div>
            <div class="dash-table-title">Registered Students <span id="liveHint" style="color:var(--c-success);font-size:12px;margin-left:8px;"></span></div>
            <div class="dash-table-sub" id="regTableSub">List of all registrations.</div>
          </div>
        </div>
        
        <div class="cc-empty" id="regEmpty" hidden>
          <div class="cc-empty-icon">🪑</div>
          <div class="cc-empty-title">No registrations yet</div>
        </div>

        <div style="overflow-x:auto;">
          <table class="dash-table">
            <thead>
              <tr>
                <th>Student Name</th>
                <th>Roll No</th>
                <th>Department</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="regBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="cc-toast" role="status" aria-live="polite"></div>
  <script src="../scripts/organiser.js"></script>
</body>
</html>
